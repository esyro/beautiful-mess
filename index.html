<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beautiful Mess</title>
    <meta name="description" content="A beautiful mess of custom garage merch, educational colouring books, handmade candles, and 3D printed creations.">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .banner-container {
            position: relative;
            max-width: 900px;
            margin: 0 auto;
        }
        .banner-container img {
            width: 100%;
            height: auto;
            border-radius: 16px;
            box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.4);
        }
    </style>
</head>
<body class="bg-[#0a0a0a] text-[#f1f1f1]">
    <!-- Navbar -->
    <nav class="navbar sticky top-0 z-50 border-b border-zinc-800">
        <div class="max-w-screen-2xl mx-auto px-8">
            <div class="flex items-center justify-between h-20">
                <a href="index.html" class="flex items-center gap-x-3">
                    <div class="w-9 h-9 bg-[#ff1493] rounded-xl flex items-center justify-center">
                        <span class="text-black text-2xl font-bold tracking-tighter">B</span>
                    </div>
                    <span class="font-display text-4xl tracking-tighter text-[#ff1493]">Beautiful Mess</span>
                </a>

                <button id="cart-btn" onclick="toggleCart()"
                        class="flex items-center gap-x-2.5 px-5 py-2.5 rounded-2xl border border-zinc-700 hover:border-pink-500 transition-all">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-pink-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" />
                    </svg>
                    <span class="text-sm font-medium">Cart</span>
                    <span id="cart-count" class="inline-flex items-center justify-center min-w-[20px] h-5 px-1.5 text-[10px] font-bold bg-pink-500 text-black rounded-full">0</span>
                </button>
            </div>
        </div>
    </nav>

    <!-- Hero with Exact Uploaded Image -->
    <div class="max-w-screen-2xl mx-auto px-6 pt-10 pb-16">
        <div class="text-center mb-8">
            <div class="inline-flex items-center gap-x-2 px-4 py-1 rounded-full bg-zinc-900 border border-zinc-800 text-xs tracking-[3px] mb-4">
                EST. 2026 • GREY COUNTY, ONTARIO
            </div>
        </div>

        <!-- The Exact Image the user uploaded -->
        <div class="banner-container mx-auto" style="max-width: 860px; position: relative;">
            <img src="assets/grok_image_1780248370806.jpg" 
                 alt="Beautiful Mess Banner" 
                 class="w-full rounded-3xl shadow-2xl"
                 usemap="#portalmap">

            <!-- Image Map - clickable boxes -->
            <map name="portalmap">
                <!-- GARAGE -->
                <area shape="rect" coords="40,920,240,1100" href="garage.html" alt="Garage">
                <!-- CUSTOM COLOURING BOOKS -->
                <area shape="rect" coords="260,920,460,1100" href="books.html" alt="Custom Colouring Books">
                <!-- CANDLES -->
                <area shape="rect" coords="480,920,680,1100" href="candles.html" alt="Candles">
                <!-- 3D PRINTING -->
                <area shape="rect" coords="700,920,832,1100" href="printing.html" alt="3D Printing">
            </map>
        </div>

        <p class="text-center text-zinc-400 mt-6 text-sm tracking-wide">
            Click any box to enter that world.
        </p>
    </div>

    <!-- Footer -->
    <footer class="bg-zinc-950 py-8 border-t border-zinc-800">
        <div class="max-w-screen-2xl mx-auto px-8 text-center text-xs text-zinc-500">
            Based in rural Grey County, Ontario • Shipping across Canada & worldwide<br>
            © 2026 Beautiful Mess. All rights reserved.
        </div>
    </footer>

    <!-- Cart Sidebar -->
    <div id="cart-sidebar" class="cart-sidebar fixed top-0 right-0 h-full w-full max-w-md bg-[#0a0a0a] border-l border-zinc-800 z-[100] transform translate-x-full transition-transform duration-300 flex flex-col">
        <div class="flex items-center justify-between px-8 py-6 border-b border-zinc-800">
            <span class="font-display text-3xl tracking-tighter">Your Cart</span>
            <button onclick="toggleCart()" class="text-3xl leading-none text-zinc-400 hover:text-white">&times;</button>
        </div>
        <div id="cart-items" class="flex-1 overflow-y-auto px-8 py-6 space-y-6 text-sm"></div>
        <div class="border-t border-zinc-800 p-8 bg-zinc-950">
            <div class="flex justify-between items-baseline mb-6">
                <span class="text-sm text-zinc-400">Total</span>
                <span id="cart-total" class="font-display text-4xl tracking-tighter">$0</span>
            </div>
            <button onclick="window.location.href='cart.html'" 
                    class="w-full py-4 rounded-2xl bg-pink-500 hover:bg-pink-600 active:scale-[0.985] transition-all text-black font-semibold tracking-wider text-sm">
                GO TO CART PAGE
            </button>
        </div>
    </div>

    <script src="js/main.js"></script>
</body>
</html>
