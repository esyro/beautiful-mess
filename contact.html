<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact — Beautiful Mess</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body class="bg-[#0a0a0a] text-[#f1f1f1]">
    <nav class="navbar sticky top-0 z-50 border-b border-zinc-800">
        <div class="max-w-screen-2xl mx-auto px-8">
            <div class="flex items-center justify-between h-20">
                <a href="index.html" class="flex items-center gap-x-3">
                    <div class="w-9 h-9 bg-[#ff1493] rounded-xl flex items-center justify-center">
                        <span class="text-black text-2xl font-bold tracking-tighter">B</span>
                    </div>
                    <span class="font-display text-4xl tracking-tighter logo-pink">Beautiful Mess</span>
                </a>
                <div class="flex items-center gap-x-8">
                    <div class="hidden md:flex items-center gap-x-8 text-sm font-medium">
                        <a href="garage.html" class="nav-link">Garage</a>
                        <a href="books.html" class="nav-link">Books</a>
                        <a href="candles.html" class="nav-link">Candles</a>
                        <a href="printing.html" class="nav-link">3D Printing</a>
                    </div>
                    <button id="cart-btn" onclick="toggleCart()" class="flex items-center gap-x-2.5 px-5 py-2.5 rounded-2xl border border-zinc-700 hover:border-pink-500 transition-all">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-pink-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" />
                        </svg>
                        <span class="text-sm font-medium">Cart</span>
                        <span id="cart-count" class="inline-flex items-center justify-center min-w-[20px] h-5 px-1.5 text-[10px] font-bold bg-pink-500 text-black rounded-full">0</span>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <div class="max-w-xl mx-auto px-8 pt-16 pb-24">
        <a href="index.html" class="text-sm text-pink-500 hover:underline flex items-center gap-x-2 mb-6">← BACK TO HUB</a>
        
        <h1 class="font-display text-6xl tracking-tighter mb-3">Let's talk.</h1>
        <p class="text-xl text-zinc-400 mb-10">Custom orders, wholesale, events, or just to say hello.</p>

        <form class="space-y-6" onsubmit="event.preventDefault(); alert('Thanks! Your message has been sent. We\'ll reply within 24 hours.'); this.reset();">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="text-xs tracking-widest text-zinc-400 block mb-2">YOUR NAME</label>
                    <input type="text" class="w-full rounded-2xl px-6 py-4 text-lg" placeholder="Alex Rivera" required>
                </div>
                <div>
                    <label class="text-xs tracking-widest text-zinc-400 block mb-2">EMAIL ADDRESS</label>
                    <input type="email" class="w-full rounded-2xl px-6 py-4 text-lg" placeholder="you@domain.com" required>
                </div>
            </div>

            <div>
                <label class="text-xs tracking-widest text-zinc-400 block mb-2">WHAT ARE YOU REACHING OUT ABOUT?</label>
                <select class="w-full rounded-2xl px-6 py-4 text-lg bg-[#111] border border-zinc-700">
                    <option>Custom 3D print / commission</option>
                    <option>Bulk colouring book order (school/library)</option>
                    <option>Custom candle scent</option>
                    <option>Garage merch wholesale or collab</option>
                    <option>General inquiry / feedback</option>
                    <option>Other</option>
                </select>
            </div>

            <div>
                <label class="text-xs tracking-widest text-zinc-400 block mb-2">MESSAGE</label>
                <textarea rows="6" class="w-full rounded-3xl px-6 py-5 text-lg resize-y" placeholder="Tell us about your idea, event, or question..." required></textarea>
            </div>

            <button type="submit" class="w-full py-5 rounded-2xl bg-pink-500 hover:bg-pink-600 active:scale-[0.985] transition-all text-black font-semibold tracking-[1.5px] text-sm mt-4">
                SEND MESSAGE
            </button>
        </form>

        <div class="mt-12 text-center text-xs text-zinc-500">
            We usually reply within 24 hours. For urgent matters, email <span class="text-pink-400">hello@beautifulmess.art</span>
        </div>
    </div>

    <!-- Cart Sidebar -->
    <div id="cart-sidebar" class="cart-sidebar fixed top-0 right-0 h-full w-full max-w-md bg-[#0a0a0a] border-l border-zinc-800 z-[100] transform translate-x-full transition-transform duration-300 flex flex-col">
        <div class="flex items-center justify-between px-8 py-6 border-b border-zinc-800">
            <span class="font-display text-3xl tracking-tighter">Your Cart</span>
            <button onclick="toggleCart()" class="text-3xl leading-none text-zinc-400 hover:text-white">&times;</button>
        </div>
        <div id="cart-items" class="flex-1 overflow-y-auto px-8 py-6 space-y-6 text-sm"></div>
        <div class="border-t border-zinc-800 p-8 bg-zinc-950">
            <div class="flex justify-between items-baseline mb-6">
                <span class="text-sm text-zinc-400">Total</span>
                <span id="cart-total" class="font-display text-4xl tracking-tighter">$0</span>
            </div>
            <button onclick="window.location.href='cart.html'" class="w-full py-4 rounded-2xl bg-pink-500 hover:bg-pink-600 active:scale-[0.985] transition-all text-black font-semibold tracking-wider text-sm">
                GO TO CART PAGE
            </button>
        </div>
    </div>

    <script src="js/main.js"></script>
</body>
</html>
