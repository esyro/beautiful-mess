<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Cart — Beautiful Mess</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body class="bg-[#0a0a0a] text-[#f1f1f1]">
    <nav class="navbar sticky top-0 z-50 border-b border-zinc-800">
        <div class="max-w-screen-2xl mx-auto px-8">
            <div class="flex items-center justify-between h-20">
                <a href="index.html" class="flex items-center gap-x-3">
                    <div class="w-9 h-9 bg-[#ff1493] rounded-xl flex items-center justify-center">
                        <span class="text-black text-2xl font-bold tracking-tighter">B</span>
                    </div>
                    <span class="font-display text-4xl tracking-tighter logo-pink">Beautiful Mess</span>
                </a>
            </div>
        </div>
    </nav>

    <div class="max-w-2xl mx-auto px-8 pt-12 pb-20">
        <a href="index.html" class="text-sm text-pink-500 hover:underline flex items-center gap-x-2 mb-6">← CONTINUE SHOPPING</a>
        
        <h1 class="font-display text-6xl tracking-tighter mb-8">Your Cart</h1>

        <div id="full-cart-items" class="space-y-6 mb-10"></div>

        <div class="border-t border-zinc-800 pt-8 flex flex-col md:flex-row md:items-end md:justify-between gap-6">
            <div>
                <div class="text-sm text-zinc-400">Total</div>
                <div id="full-cart-total" class="font-display text-6xl tracking-tighter">$0</div>
            </div>
            <div class="flex flex-col gap-3 w-full md:w-auto">
                <button onclick="checkoutDemo()" class="px-16 py-4 rounded-2xl bg-pink-500 hover:bg-pink-600 active:scale-[0.985] transition-all text-black font-semibold tracking-wider text-sm">
                    CHECKOUT
                </button>
                <button onclick="clearCart()" class="text-xs text-zinc-500 hover:text-red-400 transition-colors">Clear cart</button>
            </div>
        </div>
    </div>

    <script src="js/main.js"></script>
    <script>
        function renderFullCart() {
            const container = document.getElementById('full-cart-items');
            const totalEl = document.getElementById('full-cart-total');
            const cart = JSON.parse(localStorage.getItem('bm_cart')) || [];

            if (cart.length === 0) {
                container.innerHTML = `<div class="text-center py-16 text-zinc-400"><p class="text-2xl">Your cart is empty</p><p class="mt-2">Head back to the portals and discover something beautiful.</p></div>`;
                totalEl.textContent = '$0';
                return;
            }

            let html = '';
            let total = 0;

            cart.forEach((item, index) => {
                const itemTotal = item.price * item.quantity;
                total += itemTotal;
                html += `
                    <div class="flex gap-6 border-b border-zinc-800 pb-6">
                        <div class="flex-1">
                            <h3 class="font-medium text-xl">${item.name}</h3>
                            <p class="text-pink-500 mt-1">$${item.price} × ${item.quantity}</p>
                        </div>
                        <div class="text-right">
                            <div class="font-semibold text-xl">$${itemTotal}</div>
                            <div class="flex gap-4 mt-3 justify-end text-sm">
                                <button onclick="changeFullCartQty(${index}, -1)" class="text-zinc-400 hover:text-white">−</button>
                                <span class="px-2">${item.quantity}</span>
                                <button onclick="changeFullCartQty(${index}, 1)" class="text-zinc-400 hover:text-white">+</button>
                                <button onclick="removeFullCartItem(${index})" class="ml-4 text-red-400 hover:text-red-500">Remove</button>
                            </div>
                        </div>
                    </div>`;
            });

            container.innerHTML = html;
            totalEl.textContent = '$' + total;
        }

        function changeFullCartQty(index, delta) {
            let cart = JSON.parse(localStorage.getItem('bm_cart')) || [];
            cart[index].quantity += delta;
            if (cart[index].quantity < 1) cart.splice(index, 1);
            localStorage.setItem('bm_cart', JSON.stringify(cart));
            renderFullCart();
            // Also update any other cart count on page
            const countEl = document.getElementById('cart-count');
            if (countEl) {
                const totalItems = cart.reduce((sum, i) => sum + i.quantity, 0);
                countEl.textContent = totalItems;
            }
        }

        function removeFullCartItem(index) {
            let cart = JSON.parse(localStorage.getItem('bm_cart')) || [];
            cart.splice(index, 1);
            localStorage.setItem('bm_cart', JSON.stringify(cart));
            renderFullCart();
        }

        function clearCart() {
            if (confirm('Clear entire cart?')) {
                localStorage.removeItem('bm_cart');
                renderFullCart();
                const countEl = document.getElementById('cart-count');
                if (countEl) countEl.textContent = '0';
            }
        }

        function checkoutDemo() {
            alert('Thank you! This is a demo checkout. In production this would connect to Stripe or similar. Your order has been "placed" and the cart cleared.');
            localStorage.removeItem('bm_cart');
            window.location.href = 'index.html';
        }

        // Initial render
        document.addEventListener('DOMContentLoaded', () => {
            renderFullCart();
        });
    </script>
</body>
</html>
